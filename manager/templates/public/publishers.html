<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>出版社列表 - 图书管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/manager/public/">
                <i class="fas fa-book"></i> 图书管理系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/manager/public/">首页</a>
                <a class="nav-link" href="/manager/public/books/">图书</a>
                <a class="nav-link" href="/manager/public/authors/">作者</a>
                <a class="nav-link active" href="/manager/public/publishers/">出版社</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1><i class="fas fa-building"></i> 出版社列表</h1>
                    <form method="get" class="d-flex">
                        <input class="form-control me-2" type="search" name="search" 
                               placeholder="搜索出版社..." value="{{ search_query }}">
                        <button class="btn btn-outline-primary" type="submit">
                            <i class="fas fa-search"></i>
                        </button>
                    </form>
                </div>

                <div class="row">
                    {% for publisher in publishers %}
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100">
                            <div class="card-body">
                                <h5 class="card-title">
                                    <i class="fas fa-building"></i> {{ publisher.publisher_name }}
                                </h5>
                                <p class="text-muted">
                                    <i class="fas fa-map-marker-alt"></i> {{ publisher.publisher_address }}
                                </p>
                                <p class="text-muted">
                                    <i class="fas fa-book"></i> 
                                    出版图书: {{ publisher.book_set.count }}本
                                </p>
                                <a href="/manager/public/publishers/{{ publisher.id }}/" class="btn btn-primary btn-sm">
                                    <i class="fas fa-eye"></i> 查看详情
                                </a>
                            </div>
                        </div>
                    </div>
                    {% empty %}
                    <div class="col-12">
                        <div class="alert alert-info text-center">
                            <i class="fas fa-info-circle"></i> 
                            {% if search_query %}
                                没有找到与 "{{ search_query }}" 相关的出版社
                            {% else %}
                                暂无出版社信息
                            {% endif %}
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
