<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>图书管理系统-管理员登录</title>
    <link rel="stylesheet" type="text/css" href="../../static/css/admin.css">
    <style type="text/css">
        .bg {
            background: #f0f2f5;
            min-height: 100%;
            background-repeat: no-repeat;
            background-position: 50%;
            background-size: 100%;
            padding: 20px 0;
            position: relative;
        }
    </style>
</head>
<body class="bg">

<div class="login-main">
    <div class="logo"><img src="../../static/img/logo.gif" alt=""></div>
    <div class="header">图书管理系统</div>
    <form action="/manager/login/" method="post" class="simpleui-form">
        {% csrf_token %} {# 信息安全 #}
        <div class="simpleui-input-inline">
            <div class="el-input el-input--prefix">
                <input type="text" autocomplete="off"
                       name="number" placeholder="账号" autofocus="autofocus"class="el-input__inner" required/></div>
        </div>
        <div class="simpleui-input-inline">
            <div class="el-input el-input--prefix el-input--suffix"><!---->
                <input type="password" autocomplete="off"
                       name="password" placeholder="密码" class="el-input__inner" required/>
                <span class="el-input__prefix"></span><span class="el-input__suffix"><span class="el-input__suffix-inner"><!----><!----><!----><!----></span>
                </span></div>
        </div>
        <div class="simpleui-input-inline login-btn">
            <button type="submit" class="el-button el-button--primary">
                <span>登录</span>
            </button>
        </div>
    </form>
</div>
</body>
</html>
